name: Deploy Admin Worker

on:
  push:
    branches:
      - main
    paths:
      - 'workers/admin/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required vars
        run: |
          missing=()
          [ -z "${{ vars.GH_OWNER }}" ]              && missing+=("GH_OWNER")
          [ -z "${{ vars.GH_REPO }}" ]               && missing+=("GH_REPO")
          [ -z "${{ vars.GH_DEFAULT_BRANCH }}" ]     && missing+=("GH_DEFAULT_BRANCH")
          [ -z "${{ vars.RAKSARA_SITE_ORIGIN }}" ]   && missing+=("RAKSARA_SITE_ORIGIN")
          [ -z "${{ secrets.CF_API_TOKEN }}" ]       && missing+=("CF_API_TOKEN (secret)")
          [ -z "${{ secrets.CF_ACCOUNT_ID }}" ]      && missing+=("CF_ACCOUNT_ID (secret)")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required GitHub variables/secrets: ${missing[*]}"
            echo "Set them in Settings → Secrets and Variables → Actions before deploying."
            exit 1
          fi
          echo "✅ All required vars present"

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: workers/admin
          command: >-
            deploy
            --var GITHUB_OWNER:${{ vars.GH_OWNER }}
            --var GITHUB_REPO:${{ vars.GH_REPO }}
            --var GITHUB_DEFAULT_BRANCH:${{ vars.GH_DEFAULT_BRANCH }}
            --var CONTENT_ROOT:${{ vars.CONTENT_ROOT }}
            --var RAKSARA_SITE_ORIGIN:${{ vars.RAKSARA_SITE_ORIGIN }}
            --var ADMIN_MOCK_MODE:false
            --var ADMIN_READ_RATE_LIMIT_PER_MINUTE:${{ vars.ADMIN_READ_RATE_LIMIT_PER_MINUTE || '60' }}
            --var ADMIN_WRITE_RATE_LIMIT_PER_MINUTE:${{ vars.ADMIN_WRITE_RATE_LIMIT_PER_MINUTE || '8' }}
            --var ADMIN_MAX_BODY_BYTES:${{ vars.ADMIN_MAX_BODY_BYTES || '10485760' }}
