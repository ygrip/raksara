name: Deploy Site

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [content-update]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Checkout content
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.CONTENT_REPO }}
          token: ${{ secrets.CONTENT_PAT }}
          path: content
          lfs: true

      - name: Fetch LFS objects
        working-directory: content
        run: |
          git lfs install --force
          git lfs pull
        env:
          GIT_TRACE: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build metadata
        run: node scripts/build-metadata.js

      - name: Verify content images
        run: |
          echo "=== Images in content/assets/images/ ==="
          ls -lah content/assets/images/ || echo "Directory not found"
          echo ""
          echo "=== Images in web/content/assets/images/ ==="
          ls -lah web/content/assets/images/ || echo "Directory not found"
          echo ""
          echo "=== Checking for LFS pointers ==="
          for f in content/assets/images/*; do
            if head -c 50 "$f" 2>/dev/null | grep -q "git-lfs"; then
              echo "WARNING: LFS pointer detected: $f"
            else
              echo "OK: $f ($(wc -c < "$f") bytes)"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
