name: Deploy Site

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [content-update]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Checkout content
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.CONTENT_REPO }}
          token: ${{ secrets.CONTENT_PAT }}
          path: content
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install SvelteKit dependencies
        run: npm ci
        working-directory: sveltekit

      # image-manifest.json is in metadata/ (not in the content dir), so it survives
      # the copyMetadataToWeb() rm-rf. generateResponsiveImages() uses it for
      # hash-based skip logic. Cache the generated responsive images in the content
      # repo checkout path so copyMetadataToWeb() carries them into sveltekit/static/content/
      # before generateResponsiveImages() runs (making allExist=true → skip).
      - name: Restore image manifest cache
        uses: actions/cache@v4
        with:
          path: metadata/image-manifest.json
          key: raksara-images-${{ hashFiles('content/assets/**') }}
          restore-keys: raksara-images-

      - name: Restore responsive image variant cache
        uses: actions/cache@v4
        with:
          path: content/.raksara-responsive
          key: raksara-responsive-${{ hashFiles('content/assets/**') }}
          restore-keys: raksara-responsive-

      # OG images are expensive to generate (sharp blur/composite per entry).
      # Cache the entire output directory so only new/changed entries are regenerated.
      # Key includes content markdown + cover assets + the generator script so any
      # change to those invalidates only the affected entries (manifest-based skip).
      # restore-keys fallback ensures a partial cache is always preferred over cold start.
      - name: Restore OG image cache
        uses: actions/cache@v4
        with:
          path: sveltekit/static/og
          key: raksara-og-${{ hashFiles('content/**/*.md', 'content/assets/**', 'scripts/og-images.js') }}
          restore-keys: raksara-og-

      - name: Build metadata and static assets
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build:metadata

      # Sync generated responsive images back to content/.raksara-responsive so the
      # cache action (above) saves them. On the next run the cache will be restored to
      # content/.raksara-responsive, copyMetadataToWeb() will copy them into
      # sveltekit/static/content/, and generateResponsiveImages() will skip them.
      - name: Save responsive images for next cache
        run: |
          if [ -d sveltekit/static/content/.raksara-responsive ]; then
            mkdir -p content/.raksara-responsive
            rsync -a --delete sveltekit/static/content/.raksara-responsive/. content/.raksara-responsive/
            echo "Synced $(find content/.raksara-responsive -type f | wc -l) responsive image variants to cache"
          fi

      - name: Build SvelteKit
        env:
          PUBLIC_SITE_URL: ${{ vars.SITE_URL }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
        run: npm run build:sveltekit

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./sveltekit/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Purge Cloudflare cache
        if: vars.CF_ZONE_ID != ''
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ vars.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}')
          echo "Cloudflare purge status: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "::warning::Cloudflare cache purge returned HTTP $HTTP — you may need to purge manually"
          fi
