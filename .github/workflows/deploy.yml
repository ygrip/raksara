name: Deploy Site

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [content-update]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Checkout content
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.CONTENT_REPO }}
          token: ${{ secrets.CONTENT_PAT }}
          path: content
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install SvelteKit dependencies
        run: npm ci
        working-directory: sveltekit

      - name: Restore image variant cache
        uses: actions/cache@v4
        with:
          path: |
            sveltekit/static/content/.raksara-responsive
            metadata/image-manifest.json
          key: raksara-images-${{ hashFiles('content/assets/**') }}
          restore-keys: |
            raksara-images-

      - name: Build metadata and static assets
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build:metadata

      - name: Build SvelteKit
        env:
          PUBLIC_SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build:sveltekit

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./sveltekit/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
