<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <meta

        <meta property="og:site_name" content="Raksara" />

        <meta property="og:description" content="A place where ideas, knowledge, and engineering thoughts are recorded." />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="" />
        <meta property="og:image" content="" />
        <!-- Twitter / X Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Raksara" />
        <meta name="twitter:description" content="A place where ideas, knowledge, and engineering thoughts are recorded." />
        <meta name="twitter:image" content="" />
        <!-- Canonical -->
        <link rel="canonical" href="" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
            id="hljs-dark"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
            id="hljs-light"
            disabled
        />
        <link
            rel="icon"
            type="image/svg+xml"
            href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%236366f1'/%3E%3Cstop offset='100%25' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M16 2L30 16L16 30L2 16Z' fill='url(%23g)'/%3E%3C/svg%3E"
        />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="bg-gradient"></div>
        <div class="bg-noise"></div>

        <div id="search-overlay" class="search-overlay hidden">
            <div class="search-overlay-backdrop"></div>
            <div class="search-overlay-content glass-heavy">
                <div class="search-overlay-header">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <circle
                            cx="9"
                            cy="9"
                            r="6"
                            stroke="currentColor"
                            stroke-width="1.5"
                        />
                        <path
                            d="M13.5 13.5L17 17"
                            stroke="currentColor"
                            stroke-width="1.5"
                            stroke-linecap="round"
                        />
                    </svg>
                    <input
                        type="text"
                        id="search-overlay-input"
                        placeholder="Search posts, projects, thoughts..."
                        autocomplete="off"
                    />
                    <kbd class="search-kbd">ESC</kbd>
                </div>
                <div
                    id="search-overlay-results"
                    class="search-overlay-results"
                ></div>
            </div>
        </div>

        <div id="app">
            <nav id="sidebar">
                <div class="sidebar-header">
                    <a href="#/" class="logo">
                        <span class="logo-icon">&#9670;</span>
                        <span class="logo-text">Raksara</span>
                    </a>
                    <div class="sidebar-header-actions">
                        <button
                            id="theme-toggle"
                            aria-label="Toggle theme"
                            class="icon-btn"
                        >
                            <svg
                                class="icon-sun"
                                width="16"
                                height="16"
                                viewBox="0 0 16 16"
                                fill="none"
                            >
                                <circle
                                    cx="8"
                                    cy="8"
                                    r="3.5"
                                    stroke="currentColor"
                                    stroke-width="1.2"
                                />
                                <path
                                    d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"
                                    stroke="currentColor"
                                    stroke-width="1.2"
                                    stroke-linecap="round"
                                />
                            </svg>
                            <svg
                                class="icon-moon"
                                width="16"
                                height="16"
                                viewBox="0 0 16 16"
                                fill="none"
                            >
                                <path
                                    d="M13.5 8.5a5.5 5.5 0 01-6-6 5.5 5.5 0 106 6z"
                                    stroke="currentColor"
                                    stroke-width="1.2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                />
                            </svg>
                        </button>
                    </div>
                </div>

                <button id="search-trigger" class="search-trigger glass">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <circle
                            cx="7"
                            cy="7"
                            r="5"
                            stroke="currentColor"
                            stroke-width="1.3"
                        />
                        <path
                            d="M11 11l3.5 3.5"
                            stroke="currentColor"
                            stroke-width="1.3"
                            stroke-linecap="round"
                        />
                    </svg>
                    <span>Search...</span>
                    <kbd>/</kbd>
                </button>

                <nav class="sidebar-nav">
                    <a href="#/" class="nav-link" data-route="home">
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="none"
                        >
                            <path
                                d="M2 8.5l6-6 6 6M3.5 7.5V13a1 1 0 001 1h2.5V11h2v3h2.5a1 1 0 001-1V7.5"
                                stroke="currentColor"
                                stroke-width="1.2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                        Home
                    </a>
                    <a href="#/profile" class="nav-link" data-route="profile">
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="none"
                        >
                            <circle
                                cx="8"
                                cy="5"
                                r="3"
                                stroke="currentColor"
                                stroke-width="1.2"
                            />
                            <path
                                d="M2.5 14c0-3 2.5-4.5 5.5-4.5s5.5 1.5 5.5 4.5"
                                stroke="currentColor"
                                stroke-width="1.2"
                                stroke-linecap="round"
                            />
                        </svg>
                        Profile
                    </a>
                    <a href="#/blog" class="nav-link" data-route="blog">
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="none"
                        >
                            <rect
                                x="2"
                                y="2"
                                width="12"
                                height="12"
                                rx="1.5"
                                stroke="currentColor"
                                stroke-width="1.2"
                            />
                            <path
                                d="M5 5h6M5 8h6M5 11h3"
                                stroke="currentColor"
                                stroke-width="1.2"
                                stroke-linecap="round"
                            />
                        </svg>
                        Blog
                    </a>
                    <a
                        href="#/portfolio"
                        class="nav-link"
                        data-route="portfolio"
                    >
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="none"
                        >
                            <rect
                                x="1.5"
                                y="3"
                                width="5.5"
                                height="4.5"
                                rx="1"
                                stroke="currentColor"
                                stroke-width="1.2"
                            />
                            <rect
                                x="9"
                                y="3"
                                width="5.5"
                                height="4.5"
                                rx="1"
                                stroke="currentColor"
                                stroke-width="1.2"
                            />
                            <rect
                                x="1.5"
                                y="9.5"
                                width="5.5"
                                height="4.5"
                                rx="1"
                                stroke="currentColor"
                                stroke-width="1.2"
                            />
                            <rect
                                x="9"
                                y="9.5"
                                width="5.5"
                                height="4.5"
                                rx="1"
                                stroke="currentColor"
                                stroke-width="1.2"
                            />
                        </svg>
                        Portfolio
                    </a>
                    <a href="#/gallery" class="nav-link" data-route="gallery">
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="none"
                        >
                            <rect
                                x="2"
                                y="2"
                                width="12"
                                height="12"
                                rx="1.5"
                                stroke="currentColor"
                                stroke-width="1.2"
                            />
                            <circle
                                cx="5.5"
                                cy="5.5"
                                r="1.5"
                                stroke="currentColor"
                                stroke-width="1"
                            />
                            <path
                                d="M2 12l3.5-4 2.5 3 2-2.5L14 12"
                                stroke="currentColor"
                                stroke-width="1.2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                        Gallery
                    </a>
                    <a href="#/thoughts" class="nav-link" data-route="thoughts">
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="none"
                        >
                            <path
                                d="M8 2C4.7 2 2 4.2 2 7c0 1.6.9 3 2.3 3.9L3.5 14l3-1.5c.5.1 1 .2 1.5.2 3.3 0 6-2.2 6-5s-2.7-5-6-5z"
                                stroke="currentColor"
                                stroke-width="1.2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                        Thoughts
                    </a>
                    <a href="#/tags" class="nav-link" data-route="tags">
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="none"

                            <path
                                d="M2 8.586V3a1 1 0 011-1h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 010 1.414l-5.586 5.586a1 1 0 01-1.414 0L2.293 9.293A1 1 0 012 8.586z"
                                stroke="currentColor"
                                stroke-width="1.2"
                            />
                            <circle
                                cx="5.5"
                                cy="5.5"
                                r="1"
                                fill="currentColor"
                            />
                        </svg>
                        Tags
                    </a>
                    <a
                        href="#/categories"
                        class="nav-link"
                        data-route="categories"
                    >
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="none"
                        >
                            <path
                                d="M2 4.5A1.5 1.5 0 013.5 3h3.586a1.5 1.5 0 011.06.44L8.854 4.145A.5.5 0 009.207 4.3H12.5A1.5 1.5 0 0114 5.8V12a1.5 1.5 0 01-1.5 1.5h-9A1.5 1.5 0 012 12V4.5z"
                                stroke="currentColor"
                                stroke-width="1.2"
                            />
                        </svg>
                        Categories
                    </a>
                    <a href="#/about" class="nav-link" data-route="about">
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 16 16"
                            fill="none"
                        >
                            <circle
                                cx="8"
                                cy="8"
                                r="6"
                                stroke="currentColor"
                                stroke-width="1.2"
                            />
                            <path
                                d="M8 7v4M8 5.5v0"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                            />
                        </svg>
                        About
                    </a>
                </nav>
            </nav>

            <main id="content">
                <div id="page-content" class="page-content"></div>
            </main>
        </div>

        <div id="lightbox" class="lightbox hidden" role="dialog">
            <div class="lightbox-backdrop"></div>
            <div class="lightbox-content">
                <img id="lightbox-img" src="" alt="" />
                <p id="lightbox-caption"></p>
                <button class="lightbox-close" aria-label="Close">
                    &times;
                </button>
            </div>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/minisearch@7.1.1/dist/umd/index.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
